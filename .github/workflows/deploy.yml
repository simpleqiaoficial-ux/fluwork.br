name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: fluworkbr
  REGION: southamerica-east1
  REPOSITORY: fluworkbr-images
  SERVICE: fluworkbr
  IMAGE: southamerica-east1-docker.pkg.dev/fluworkbr/fluworkbr-images/fluworkbr

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/986924311273/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: fluworkbr-deploy-sa@fluworkbr.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet

      - name: Build image
        run: docker build --target runner -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .

      - name: Push image
        run: docker push $IMAGE:${{ github.sha }} && docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --project=$PROJECT_ID \
            --region=$REGION \
            --image=$IMAGE:${{ github.sha }} \
            --service-account=fluworkbr-run-sa@fluworkbr.iam.gserviceaccount.com \
            --network=fluworkbr-vpc \
            --subnet=fluworkbr-run-subnet \
            --vpc-egress=private-ranges-only \
            --set-secrets=DATABASE_URL=database-url:latest \
            --set-env-vars=GCS_BUCKET_NAME=fluworkbr-documents,NODE_ENV=production \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=10 \
            --quiet
